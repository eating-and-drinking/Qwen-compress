# Stage 1: Group-wise distillation from Qwen2.5-14B-Instruct teacher
# into Qwen2.5-3B student (initialized from the official 3B pretrained checkpoint).
#
# Hardware target: 8x A100 80GB (teacher sharded with device_map=auto, student on cuda:0).
# Adjust gradient_accumulation_steps for smaller setups.

stage: distill

teacher_model_name_or_path: Qwen/Qwen2.5-14B-Instruct
student_model_name_or_path: Qwen/Qwen2.5-3B

# Group-wise distillation hyperparameters.
num_groups: 12
group_strategy: uniform

# Composite loss weights:  L = alpha*CE + beta*KD + gamma*hidden + delta*attn
alpha_ce: 1.0
beta_kd: 1.0
gamma_hidden: 1.0
delta_attn: 0.5
kd_temperature: 2.0

freeze_embedding: false

data:
  train_path: ./data/cot_sft_120k.jsonl
  eval_path: ./data/cot_eval.jsonl
  max_seq_length: 4096
  batch_size: 2
  gradient_accumulation_steps: 16   # effective batch = 32
  num_workers: 4
  shuffle_seed: 42
  cot_mode: dual                    # alternate direct / CoT outputs

training:
  output_dir: ./checkpoints/distill
  num_train_epochs: 3.0
  max_steps: -1
  gradient_checkpointing: true
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 500
  eval_steps: 500
  logging_steps: 10
  save_total_limit: 3
  seed: 42
  optimizer:
    name: adamw
    lr: 1.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.01
    eps: 1.0e-8
  scheduler:
    name: cosine_with_warmup
    warmup_ratio: 0.03
    min_lr_ratio: 0.1
