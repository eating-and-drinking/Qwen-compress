# Stage 1: MOT-FD distillation from Qwen2.5-14B-Instruct teacher
# into Qwen2.5-3B student.
#
# Algorithm: Monotonic Optimal Transport Functional Distillation (MOT-FD)
#   - Teacher: 48 layers → 12 functional groups via change-point detection
#   - Student: 36 layers, continuous representation manifold
#   - Alignment: Sinkhorn optimal transport with monotonic constraint
#   - Loss: L = α·CE + β·KD + λ_ot·L_OT + λ_mono·L_mono
#
# Hardware target: 1x GPU with 48 GB VRAM (e.g. A6000 / A100-40 / RTX 6000 Ada).
# Teacher is loaded in INT8 via bitsandbytes (~15 GB) so the 14B teacher +
# 3B student + 8-bit Adam + activations fits within ~33 GB.
# For 80 GB GPUs: set teacher_load_in_8bit: false and increase batch_size.

stage: distill

teacher_model_name_or_path: ./models/Qwen2.5-14B-Instruct
student_model_name_or_path: ./models/Qwen2.5-3B

# ---- Functional Decomposition (48 → 12 groups) ----
num_groups: 12
calibration_samples: 256          # samples for teacher decomposition
energy_alpha: 1.0                 # α: first-order change weight
energy_beta: 0.5                  # β: second-order (acceleration) weight
energy_gamma: 0.3                 # γ: cosine-distance weight
min_peak_distance: 2              # minimum gap between breakpoints

# ---- MOT-FD Composite Loss Weights ----
# L = α·L_CE + β·L_KD + λ_ot·L_OT + λ_mono·L_mono + δ·L_attn
alpha_ce: 1.0                     # CE weight
beta_kd: 1.0                      # KD (KL divergence) weight
gamma_hidden: 0.0                 # legacy hidden cosine (0 = disabled)
delta_attn: 0.0                   # attention distillation weight (0 = disabled)
lambda_ot: 1.0                    # OT alignment weight (student→teacher)
lambda_mono: 0.1                  # monotonic regularization weight

# ---- Temperature / Hyperparameters ----
kd_temperature: 2.0               # KD softmax temperature
ot_temperature: 0.1               # Sinkhorn entropy regularization ε
sinkhorn_iters: 50                # Sinkhorn iterations

# ---- Enhanced Features ----
adaptive_ot_temp: false           # enable adaptive OT temperature
adaptive_temp_min: 0.05           # minimum adaptive temperature
adaptive_temp_max: 0.5            # maximum adaptive temperature
adaptive_temp_scale: 1.0          # scaling factor for adaptive temperature

# ---- Attention Distillation ----
attn_distill_strategy: kl         # kl, cosine, mse, ot
attn_ot_temperature: 0.1          # OT temperature for attention distillation
attn_sinkhorn_iters: 50           # Sinkhorn iterations for attention OT

# ---- Dynamic Functional Groups ----
dynamic_groups: false             # enable dynamic group updates
dynamic_groups_update_interval: 500  # update interval in steps
dynamic_groups_momentum: 0.99     # momentum for smooth updates

# ---- Memory optimizations ----
teacher_load_in_8bit: true         # INT8 teacher: ~15 GB vs 29 GB (BF16)
teacher_load_in_4bit: false        # NF4 fallback (~7 GB) if still OOM

freeze_embedding: false
projector_lr_multiplier: 0.1      # projector LR = base LR × this value

data:
  train_path: ./data/cot_sft_train.jsonl
  eval_path: ./data/cot_eval.jsonl
  max_seq_length: 2048             # 4096 → 2048 saves ~6 GB activation memory
  batch_size: 1                    # 2 → 1; effective batch kept via grad_accum
  gradient_accumulation_steps: 32  # effective batch = 32 (same as before)
  num_workers: 4
  shuffle_seed: 42
  cot_mode: dual                    # alternate direct / CoT outputs

training:
  output_dir: ./checkpoints/distill
  num_train_epochs: 3.0
  max_steps: -1
  gradient_checkpointing: true
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 500
  eval_steps: 500
  logging_steps: 10
  save_total_limit: 3
  seed: 42
  optimizer:
    name: adamw_8bit              # 8-bit Adam: ~3 GB vs 25 GB (fp32 Adam)
    lr: 1.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.01
    eps: 1.0e-8
  scheduler:
    name: cosine_with_warmup
    warmup_ratio: 0.03
    min_lr_ratio: 0.1
