# Full three-stage pipeline with MOT-FD distillation:
#   MOT-FD: Qwen2.5-14B-Instruct -> Qwen2.5-3B
#   → SparseGPT 50% pruning + recovery FT
#   → INT8 QAT with QAD using the same teacher
#
# To launch:  qwen-compress pipeline --config configs/pipeline/full.yaml

stage: pipeline

name: qwen2_5_14b_to_3b_int8_pipeline

distill:
  teacher_model_name_or_path: Qwen/Qwen2.5-14B-Instruct
  student_model_name_or_path: Qwen/Qwen2.5-3B

  # ---- Functional Decomposition ----
  num_groups: 12
  calibration_samples: 256
  energy_alpha: 1.0
  energy_beta: 0.5
  energy_gamma: 0.3
  min_peak_distance: 2

  # ---- MOT-FD Loss Weights ----
  alpha_ce: 1.0
  beta_kd: 1.0
  gamma_hidden: 0.0
  delta_attn: 0.0
  lambda_ot: 1.0
  lambda_mono: 0.1
  lambda_ot_backward: 0.0

  kd_temperature: 2.0
  ot_temperature: 0.1
  sinkhorn_iters: 50
  freeze_embedding: false
  projector_lr_multiplier: 0.1

  # ---- Enhanced Features ----
  adaptive_ot_temp: false
  attn_distill_strategy: kl

  data:
    train_path: ./data/cot_sft_120k.jsonl
    max_seq_length: 4096
    batch_size: 2
    gradient_accumulation_steps: 16
    num_workers: 4
    shuffle_seed: 42
    cot_mode: dual
  training:
    output_dir: ./checkpoints/pipeline/distill
    num_train_epochs: 3.0
    gradient_checkpointing: true
    bf16: true
    save_steps: 500
    logging_steps: 10
    save_total_limit: 3
    seed: 42
    optimizer: { name: adamw, lr: 1.0e-4, betas: [0.9, 0.95], weight_decay: 0.01, eps: 1.0e-8 }
    scheduler: { name: cosine_with_warmup, warmup_ratio: 0.03, min_lr_ratio: 0.1 }

prune:
  model_name_or_path: placeholder        # overwritten by pipeline driver
  output_dir: ./checkpoints/pipeline/prune
  sparsity: 0.5
  sparsity_type: unstructured
  block_size: 128
  percdamp: 0.01
  calibration_path: ./data/cot_sft_120k.jsonl
  nsamples: 128
  max_seq_length: 2048
  seed: 42
  device: cuda
  recovery_finetune: true
  recovery:
    output_dir: ./checkpoints/pipeline/prune/recovery
    num_train_epochs: 0.3
    gradient_checkpointing: true
    bf16: true
    save_steps: 200
    logging_steps: 10
    save_total_limit: 2
    seed: 42
    optimizer: { name: adamw, lr: 2.0e-5, betas: [0.9, 0.95], weight_decay: 0.0, eps: 1.0e-8 }
    scheduler: { name: cosine_with_warmup, warmup_ratio: 0.05, min_lr_ratio: 0.1 }

qat:
  model_name_or_path: placeholder        # overwritten by pipeline driver
  teacher_model_name_or_path: Qwen/Qwen2.5-14B-Instruct
  weight_bits: 8
  activation_bits: 8
  weight_granularity: per_channel
  activation_granularity: per_tensor
  weight_symmetric: true
  activation_symmetric: false
  quantize_kv_cache: true
  quantize_lm_head: false
  skip_layers: [lm_head, embed_tokens]
  calibration_path: ./data/cot_sft_120k.jsonl
  nsamples_calib: 512
  calibration_method: percentile
  percentile: 99.99
  use_qad: true
  alpha_ce: 0.5
  beta_kd: 1.0
  gamma_hidden: 0.5
  kd_temperature: 2.0
  export_format: safetensors
  data:
    train_path: ./data/cot_sft_120k.jsonl
    max_seq_length: 2048
    batch_size: 2
    gradient_accumulation_steps: 8
    num_workers: 4
    shuffle_seed: 42
    cot_mode: dual
  training:
    output_dir: ./checkpoints/pipeline/qat
    num_train_epochs: 0.5
    gradient_checkpointing: true
    bf16: true
    save_steps: 200
    logging_steps: 10
    save_total_limit: 2
    seed: 42
    optimizer: { name: adamw, lr: 2.0e-5, betas: [0.9, 0.95], weight_decay: 0.0, eps: 1.0e-8 }
    scheduler: { name: cosine_with_warmup, warmup_ratio: 0.05, min_lr_ratio: 0.1 }
