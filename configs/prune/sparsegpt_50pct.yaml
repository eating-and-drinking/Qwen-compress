
stage: prune

model_name_or_path: ./checkpoints/distill/final
output_dir: ./checkpoints/prune

sparsity: 0.5
sparsity_type: unstructured         
percdamp: 0.01


calibration_path: ./data/cot_sft_train.jsonl
nsamples: 128
max_seq_length: 2048
seed: 42
device: cuda


recovery_finetune: true
recovery:
  output_dir: ./checkpoints/prune/recovery
  num_train_epochs: 0.3
  max_steps: -1
  gradient_checkpointing: true
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 200
  eval_steps: 200
  logging_steps: 10
  save_total_limit: 2
  seed: 42
  optimizer:
    name: adamw
    lr: 2.0e-5
    betas: [0.9, 0.95]
    weight_decay: 0.0
    eps: 1.0e-8
  scheduler:
    name: cosine_with_warmup
    warmup_ratio: 0.05
    min_lr_ratio: 0.1